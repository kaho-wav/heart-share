<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#F7F1F2;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
}

.card{

    width:280px;

    padding:42px;

    border-radius:32px;

    background:#FFFFFF;

    box-shadow:
        0 12px 40px rgba(104,84,87,0.08);

    text-align:center;
}

.heart{

    font-size:40px;

    color:#B47B84;

    animation:pulse 1.2s infinite;
}

.bpm{

    margin-top:12px;

    font-size:76px;
    font-weight:700;

    color:#685457;

    line-height:1;
}

.label{

    margin-top:10px;

    font-size:15px;

    color:#8C6A6E;

    letter-spacing:3px;
}

.status{

    margin-top:28px;

    font-size:14px;

    color:#B47B84;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        opacity:0.9;
    }

    50%{
        transform:scale(1.10);
        opacity:1;
    }

    100%{
        transform:scale(1);
        opacity:0.9;
    }
}

</style>
</head>

<body>

<h1>♡ Heart Share ♡</h1>

<form method="POST">

    <input
        type="password"
        name="password"
        placeholder="Password"
    >

    <br>

    <button type="submit">
        Enter
    </button>

</form>

</body>
</html>

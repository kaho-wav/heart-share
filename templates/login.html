<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body{
            height:100vh;
            margin:0;

            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;

            background:#ffd6e7;
            font-family:sans-serif;
        }

        input{
            padding:12px;
            font-size:18px;
            border-radius:10px;
            border:none;
        }

        button{
            margin-top:15px;
            padding:12px 20px;
            font-size:18px;

            border:none;
            border-radius:10px;

            background:#ff5c8a;
            color:white;
        }
    </style>
</head>

<body>

<h1>♡ Heart Share ♡</h1>

<form method="POST">

    <input
        type="password"
        name="password"
        placeholder="Password"
    >

    <br>

    <button type="submit">
        Enter
    </button>

</form>

</body>
</html>
